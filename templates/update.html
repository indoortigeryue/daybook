{% extends "base.html" %}

{% block head %}
<title>Edit Task &middot; Daybook</title>
{% endblock %}

{% block body %}
<div class="content">
    <div class="card">
        <a href="/" class="back-link">&larr; Back</a>
        <p class="eyebrow">Editing</p>
        <h1>Refine your task</h1>
        <p class="subtitle">Take a breath. Adjust the words until they fit.</p>
        <hr class="divider">

        <form action="/update/{{task.id}}" method="POST" class="task-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="content" id="content" class="input"
                   value="{{task.content}}" autofocus required>
            <button type="submit" class="btn btn-primary">Save</button>
        </form>
    </div>
</div>
{% endblock %}
